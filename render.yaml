databases:
  - name: multilimp-db
    databaseName: limpieza_db
    user: admin
    plan: free

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: multilimp-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multilimp-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440

      - key: ALLOWED_ORIGINS
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: WHATSAPP_NEGOCIO
        sync: false
      - key: ALIAS_PAGO
        sync: false
      - key: NOMBRE_NEGOCIO
        value: MultiLimp

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: multilimp-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start -- -p $PORT
    plan: free

    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

      - key: NEXT_PUBLIC_NOMBRE_NEGOCIO
        value: MultiLimp

      - key: NEXT_PUBLIC_WHATSAPP_NEGOCIO
        sync: false
